<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IT Inventory Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #1e293b; }
        .sidebar .nav-link { color: #94a3b8; transition: all 0.2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); border-radius: 6px; }
        .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; }
        .stat-card { border: none; border-radius: 12px; transition: transform .2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .badge-status-Active { background-color: #198754; }
        .badge-status-Retired { background-color: #6c757d; }
        .badge-status-In.Repair { background-color: #ffc107; color: #000; }
        .badge-status-In.Storage { background-color: #0dcaf0; color: #000; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 sidebar py-3 px-3">
            <div class="d-flex align-items-center mb-4">
                <i class="bi bi-hdd-rack-fill text-info me-2 fs-4"></i>
                <span class="brand">IT Inventory</span>
            </div>
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint in ['list_assets','new_asset','edit_asset'] %}active{% endif %}" href="{{ url_for('list_assets') }}">
                        <i class="bi bi-list-ul me-2"></i>All Assets
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('new_asset') }}">
                        <i class="bi bi-plus-circle me-2"></i>Add Asset
                    </a>
                </li>
                <hr class="border-secondary">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('export_csv') }}">
                        <i class="bi bi-download me-2"></i>Export CSV
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="col-md-10 py-4 px-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
